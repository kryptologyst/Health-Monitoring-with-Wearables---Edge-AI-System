# Quantization Configuration for Health Monitoring Models
quantization:
  # Post-training quantization
  ptq:
    enabled: true
    calibration_samples: 1000
    calibration_method: "minmax"
    per_channel: false
    
  # Quantization-aware training
  qat:
    enabled: true
    epochs: 10
    learning_rate: 0.001
    quantize_weights: true
    quantize_activations: true
    
  # Precision settings
  precision:
    weight_bits: 8
    activation_bits: 8
    bias_bits: 32
    
  # Calibration data
  calibration:
    dataset_path: "data/processed/calibration"
    batch_size: 32
    num_batches: 32
    
  # Accuracy-aware quantization
  accuracy_aware:
    enabled: true
    target_accuracy_drop: 0.02
    max_iterations: 5
    patience: 3
